<style>
  /* Widen the single-column talk cards to ~75% of the section width */
  #talks .container {
    max-width: 75% !important;
  }

  /* Give the figure more space relative to the title/intro/date (desktop) */
  @media (min-width: 768px) {
    /* Image column: width split (change 35% to taste) + full card height.
       position:relative makes it the anchor for the absolutely-placed image. */
    #talks .container .md\:flex-shrink-0 {
      flex: 0 0 30%;
      align-self: stretch;
      position: relative;
    }
    /* Take the image out of flow so it can't drive the card height; the card
       height is set by the text, and the image fills that slot (cropping). */
    #talks .container .md\:flex-shrink-0 img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
  }
</style>
